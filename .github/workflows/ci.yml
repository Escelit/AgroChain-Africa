name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agrochain
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agrochain_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache — no lockfile committed yet

      - name: Install dependencies
        run: npm install
        working-directory: apps/backend

      - name: Lint
        run: npm run lint -- --max-warnings=0
        working-directory: apps/backend

      - name: Unit tests
        run: npm run test -- --passWithNoTests
        working-directory: apps/backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://agrochain:password@localhost:5432/agrochain_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          STELLAR_NETWORK: testnet
          PLATFORM_SIGNER_SECRET: ''
          ORACLE_API_KEY: test-key

  contracts:
    name: Soroban contracts — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract tests
        run: cargo test
        working-directory: contracts

  frontend:
    name: Frontend — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: apps/frontend

      - name: Build (type-check)
        run: npm run build -- --configuration development
        working-directory: apps/frontend

      - name: Unit tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless --no-progress
        working-directory: apps/frontend
