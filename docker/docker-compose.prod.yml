version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agrochain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: agrochain_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agrochain']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/agrochain-backend:${IMAGE_TAG}
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://agrochain:${POSTGRES_PASSWORD}@postgres:5432/agrochain_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      STELLAR_NETWORK: mainnet
      STELLAR_HORIZON_URL: https://horizon.stellar.org
      STELLAR_RPC_URL: https://soroban.stellar.org
      HARVEST_TOKEN_CONTRACT_ID: ${HARVEST_TOKEN_CONTRACT_ID}
      ESCROW_CONTRACT_ID: ${ESCROW_CONTRACT_ID}
      CREDIT_SCORE_CONTRACT_ID: ${CREDIT_SCORE_CONTRACT_ID}
      LOAN_CONTRACT_ID: ${LOAN_CONTRACT_ID}
      PLATFORM_SIGNER_SECRET: ${PLATFORM_SIGNER_SECRET}
      ORACLE_PUBLIC_KEY: ${ORACLE_PUBLIC_KEY}
      ORACLE_SIGNER_SECRET: ${ORACLE_SIGNER_SECRET}
      ORACLE_API_KEY: ${ORACLE_API_KEY}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY}
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME}
      SENTINEL_HUB_CLIENT_ID: ${SENTINEL_HUB_CLIENT_ID}
      SENTINEL_HUB_CLIENT_SECRET: ${SENTINEL_HUB_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '3000:3000'

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  frontend_dist:
